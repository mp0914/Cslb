<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="handle192" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a96a"/>
      <stop offset="50%" stop-color="#c49060"/>
      <stop offset="100%" stop-color="#a87840"/>
    </linearGradient>
    <linearGradient id="bristles192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ferrule192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8c4d0"/>
      <stop offset="100%" stop-color="#7a8899"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="36" fill="url(#bg192)"/>

  <!-- Subtle grid accent -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#2a2d3e" stroke-width="1" opacity="0.4"/>

  <!-- Paintbrush group, centered and angled -42 degrees -->
  <g transform="translate(96, 92) rotate(-42)">
    <!-- Wooden handle -->
    <rect x="-5.5" y="-78" width="11" height="82" rx="4" fill="url(#handle192)"/>
    <!-- Handle wood grain -->
    <line x1="-2.5" y1="-70" x2="-2.5" y2="-4" stroke="#e0b678" stroke-width="0.6" opacity="0.35"/>
    <line x1="1.5" y1="-72" x2="1.5" y2="-4" stroke="#8b6030" stroke-width="0.5" opacity="0.3"/>
    <!-- Handle end cap -->
    <ellipse cx="0" cy="-78" rx="5.5" ry="3.5" fill="#7a5228"/>
    <ellipse cx="0" cy="-78" rx="3.5" ry="2" fill="#9a6838" opacity="0.6"/>

    <!-- Ferrule (metal collar) -->
    <rect x="-7" y="4" width="14" height="18" rx="2" fill="url(#ferrule192)"/>
    <!-- Ferrule top shine band -->
    <rect x="-7" y="4" width="14" height="3.5" rx="2" fill="#dde6ee" opacity="0.8"/>
    <!-- Ferrule bottom shine band -->
    <rect x="-7" y="18.5" width="14" height="3.5" rx="0" fill="#dde6ee" opacity="0.5"/>
    <!-- Ferrule rivets -->
    <circle cx="-3" cy="13" r="1.5" fill="#5a6878" opacity="0.7"/>
    <circle cx="3" cy="13" r="1.5" fill="#5a6878" opacity="0.7"/>

    <!-- Bristles (tapered shape) -->
    <path d="M-7,22 L-12,60 Q-6,70 0,73 Q6,70 12,60 L7,22 Z" fill="url(#bristles192)"/>
    <!-- Bristle texture lines -->
    <line x1="-4" y1="24" x2="-8" y2="60" stroke="#60a5fa" stroke-width="0.6" opacity="0.35"/>
    <line x1="0" y1="24" x2="0" y2="65" stroke="#93c5fd" stroke-width="0.7" opacity="0.3"/>
    <line x1="4" y1="24" x2="8" y2="60" stroke="#60a5fa" stroke-width="0.6" opacity="0.35"/>
    <!-- Bristle tip highlight -->
    <path d="M-8,58 Q0,67 8,58" stroke="#bfdbfe" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Paint drop at tip -->
    <ellipse cx="0" cy="76" rx="4.5" ry="5.5" fill="#3b82f6"/>
    <ellipse cx="-1.5" cy="73.5" rx="1.8" ry="1.5" fill="#93c5fd" opacity="0.7"/>
  </g>

  <!-- Small paint splash accent -->
  <circle cx="148" cy="48" r="3" fill="#60a5fa" opacity="0.3"/>
  <circle cx="152" cy="54" r="1.5" fill="#60a5fa" opacity="0.2"/>
  <circle cx="44" cy="148" r="2" fill="#3b82f6" opacity="0.25"/>
</svg>
