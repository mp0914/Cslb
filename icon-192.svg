<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="handle192" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a96a"/>
      <stop offset="50%" stop-color="#c49060"/>
      <stop offset="100%" stop-color="#a87840"/>
    </linearGradient>
    <linearGradient id="bristles192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ferrule192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d4e0"/>
      <stop offset="100%" stop-color="#6b7a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg192)"/>

  <!-- House painter's brush, centered, angled -38 degrees -->
  <g transform="translate(96, 90) rotate(-38)">

    <!-- Wooden handle -->
    <rect x="-6" y="-74" width="12" height="70" rx="4" fill="url(#handle192)"/>
    <!-- Wood grain -->
    <line x1="-2" y1="-68" x2="-2" y2="-8" stroke="#e0b678" stroke-width="0.7" opacity="0.4"/>
    <line x1="2" y1="-70" x2="2" y2="-8" stroke="#8b6030" stroke-width="0.5" opacity="0.3"/>
    <!-- Handle end cap -->
    <rect x="-6" y="-74" width="12" height="7" rx="4" fill="#7a5228"/>

    <!-- Ferrule — wide flat metal band, key feature of a wall brush -->
    <rect x="-14" y="-4" width="28" height="15" rx="2.5" fill="url(#ferrule192)"/>
    <!-- Top shine band -->
    <rect x="-14" y="-4" width="28" height="4" rx="2.5" fill="#e8f0f7" opacity="0.75"/>
    <!-- Bottom shine band -->
    <rect x="-14" y="7" width="28" height="4" rx="0" fill="#e8f0f7" opacity="0.4"/>
    <!-- Rivets -->
    <circle cx="-6" cy="5.5" r="1.8" fill="#4a5a6a" opacity="0.6"/>
    <circle cx="6" cy="5.5" r="1.8" fill="#4a5a6a" opacity="0.6"/>

    <!-- Bristle body — wide rectangular block (house painter proportions) -->
    <path d="M-14,11 L-16,52 L16,52 L14,11 Z" fill="url(#bristles192)"/>

    <!-- Bristle texture (vertical lines representing bristle bundles) -->
    <line x1="-9"  y1="13" x2="-10" y2="50" stroke="#bfdbfe" stroke-width="0.8" opacity="0.35"/>
    <line x1="-4"  y1="13" x2="-4"  y2="51" stroke="#dbeafe" stroke-width="0.7" opacity="0.3"/>
    <line x1="1"   y1="13" x2="1"   y2="51" stroke="#bfdbfe" stroke-width="0.8" opacity="0.35"/>
    <line x1="6"   y1="13" x2="7"   y2="50" stroke="#dbeafe" stroke-width="0.7" opacity="0.3"/>
    <line x1="11"  y1="13" x2="12"  y2="50" stroke="#bfdbfe" stroke-width="0.6" opacity="0.3"/>

    <!-- Flagged bristle tips (wavy edge — characteristic of a quality wall brush) -->
    <path d="M-16,52 Q-13,58 -10,53 Q-7,59 -4,54 Q-1,59 2,54 Q5,59 8,54 Q11,58 14,53 Q15.5,58 16,52"
          stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.9"/>

    <!-- Paint load at bristle tips -->
    <path d="M-16,52 Q-13,58 -10,53 Q-7,59 -4,54 Q-1,59 2,54 Q5,59 8,54 Q11,58 14,53 Q15.5,58 16,52 L16,55 Q11,61 8,57 Q5,62 2,57 Q-1,62 -4,57 Q-7,62 -10,56 Q-13,61 -16,55 Z"
          fill="#2563eb" opacity="0.65"/>

  </g>

  <!-- Paint stroke accent (shows the brush has been used) -->
  <rect x="118" y="38" width="28" height="6" rx="3" fill="#60a5fa" opacity="0.18" transform="rotate(-38, 132, 41)"/>
</svg>
