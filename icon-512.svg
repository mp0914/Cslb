<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="handle512" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a96a"/>
      <stop offset="50%" stop-color="#c49060"/>
      <stop offset="100%" stop-color="#a87840"/>
    </linearGradient>
    <linearGradient id="bristles512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ferrule512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d4e0"/>
      <stop offset="100%" stop-color="#6b7a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg512)"/>

  <!-- House painter's brush, centered, angled -38 degrees -->
  <g transform="translate(256, 240) rotate(-38)">

    <!-- Wooden handle -->
    <rect x="-16" y="-197" width="32" height="187" rx="10" fill="url(#handle512)"/>
    <!-- Wood grain -->
    <line x1="-5"  y1="-182" x2="-5"  y2="-22" stroke="#e0b678" stroke-width="1.8" opacity="0.4"/>
    <line x1="5"   y1="-188" x2="5"   y2="-22" stroke="#8b6030" stroke-width="1.4" opacity="0.3"/>
    <!-- Handle end cap -->
    <rect x="-16" y="-197" width="32" height="18" rx="10" fill="#7a5228"/>

    <!-- Ferrule — wide flat metal band -->
    <rect x="-37" y="-10" width="74" height="40" rx="7" fill="url(#ferrule512)"/>
    <!-- Top shine band -->
    <rect x="-37" y="-10" width="74" height="11" rx="7" fill="#e8f0f7" opacity="0.75"/>
    <!-- Bottom shine band -->
    <rect x="-37" y="19" width="74" height="11" rx="0" fill="#e8f0f7" opacity="0.4"/>
    <!-- Rivets -->
    <circle cx="-16" cy="15" r="5" fill="#4a5a6a" opacity="0.6"/>
    <circle cx="16"  cy="15" r="5" fill="#4a5a6a" opacity="0.6"/>

    <!-- Bristle body — wide rectangular block -->
    <path d="M-37,30 L-43,138 L43,138 L37,30 Z" fill="url(#bristles512)"/>

    <!-- Bristle texture lines -->
    <line x1="-24" y1="34" x2="-27" y2="133" stroke="#bfdbfe" stroke-width="2.2" opacity="0.35"/>
    <line x1="-12" y1="34" x2="-12" y2="135" stroke="#dbeafe" stroke-width="2"   opacity="0.3"/>
    <line x1="0"   y1="34" x2="0"   y2="136" stroke="#bfdbfe" stroke-width="2.2" opacity="0.35"/>
    <line x1="12"  y1="34" x2="12"  y2="135" stroke="#dbeafe" stroke-width="2"   opacity="0.3"/>
    <line x1="24"  y1="34" x2="27"  y2="133" stroke="#bfdbfe" stroke-width="2.2" opacity="0.35"/>

    <!-- Flagged bristle tips -->
    <path d="M-43,138 Q-36,155 -27,142 Q-18,158 -10,143 Q-2,158 6,143 Q14,158 22,143 Q30,155 37,142 Q40,156 43,138"
          stroke="#93c5fd" stroke-width="4" fill="none" opacity="0.9"/>

    <!-- Paint load at bristle tips -->
    <path d="M-43,138 Q-36,155 -27,142 Q-18,158 -10,143 Q-2,158 6,143 Q14,158 22,143 Q30,155 37,142 Q40,156 43,138 L43,148 Q40,163 37,151 Q30,165 22,152 Q14,166 6,152 Q-2,166 -10,152 Q-18,165 -27,151 Q-36,162 -43,148 Z"
          fill="#2563eb" opacity="0.65"/>

  </g>

  <!-- Paint stroke accent -->
  <rect x="315" y="100" width="74" height="16" rx="8" fill="#60a5fa" opacity="0.18" transform="rotate(-38, 352, 108)"/>
</svg>
